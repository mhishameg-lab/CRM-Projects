<style>
/* ═══════════════════════════════════════════════════════════════════════════════
   ICO Center Portal — Master Stylesheet v2
   Design: Industrial Precision + Psychology-Driven UI
   ═══════════════════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

/* ── CSS Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg-base      : #f0f4ff;
  --bg-surface   : #ffffff;
  --bg-surface2  : #f8faff;
  --bg-sidebar   : #0f1e3d;
  --bg-sidebar-h : #1a3160;
  --bg-sidebar-a : #2563eb;
  --border       : #dde4f0;
  --border-strong: #c3cedf;

  --text-primary : #0d1b3e;
  --text-secondary:#4a5a7a;
  --text-muted   : #8496b4;
  --text-sidebar : #c8d6f0;
  --text-sidebar-a: #ffffff;

  --accent-primary : #2563eb;
  --accent-light   : #3b82f6;
  --accent-lighter : #dbeafe;
  --accent-glow    : rgba(37,99,235,0.12);

  --success      : #059669;
  --success-bg   : #d1fae5;
  --warning      : #d97706;
  --warning-bg   : #fef3c7;
  --danger       : #dc2626;
  --danger-bg    : #fee2e2;
  --info         : #0891b2;
  --info-bg      : #cffafe;
  --orange       : #ea580c;
  --orange-bg    : #ffedd5;
  --purple       : #7c3aed;
  --purple-bg    : #ede9fe;

  --shadow-sm    : 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md    : 0 4px 16px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
  --shadow-lg    : 0 12px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
  --shadow-card  : 0 0 0 1px var(--border), 0 4px 16px rgba(0,0,0,.06);

  --radius-sm    : 6px;
  --radius-md    : 10px;
  --radius-lg    : 14px;
  --radius-xl    : 20px;

  --sidebar-w    : 240px;
  --topbar-h     : 60px;
  --transition   : 180ms cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"] {
  --bg-base      : #060d1f;
  --bg-surface   : #0d1b36;
  --bg-surface2  : #111f40;
  --bg-sidebar   : #070e20;
  --bg-sidebar-h : #0f1e3d;
  --bg-sidebar-a : #2563eb;
  --border       : #1a2d55;
  --border-strong: #233769;

  --text-primary : #e8f0ff;
  --text-secondary:#8ba8d4;
  --text-muted   : #4d6a9a;
  --text-sidebar : #6b8fc4;
  --text-sidebar-a: #ffffff;

  --accent-primary : #3b82f6;
  --accent-light   : #60a5fa;
  --accent-lighter : rgba(59,130,246,.12);
  --accent-glow    : rgba(59,130,246,.18);

  --success      : #10b981;
  --success-bg   : rgba(16,185,129,.15);
  --warning      : #f59e0b;
  --warning-bg   : rgba(245,158,11,.15);
  --danger       : #ef4444;
  --danger-bg    : rgba(239,68,68,.15);
  --info         : #22d3ee;
  --info-bg      : rgba(34,211,238,.12);
  --orange       : #fb923c;
  --orange-bg    : rgba(251,146,60,.15);
  --purple       : #a78bfa;
  --purple-bg    : rgba(167,139,250,.15);

  --shadow-sm    : 0 1px 3px rgba(0,0,0,.3);
  --shadow-md    : 0 4px 16px rgba(0,0,0,.4);
  --shadow-lg    : 0 12px 40px rgba(0,0,0,.5);
  --shadow-card  : 0 0 0 1px var(--border), 0 4px 16px rgba(0,0,0,.3);
}

/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
}
a { color: var(--accent-primary); text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ── Scrollbars ────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ══════════════════════════════════════════════════════════════════════════════
   LOGIN PAGE
   ══════════════════════════════════════════════════════════════════════════════ */
#login-page {
  display: flex;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,99,235,.25) 0%, transparent 60%),
    var(--bg-base);
  overflow: auto;
}
.login-container { width: 440px; max-width: 95vw; animation: fadeUp .5s ease both; }
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.login-logo-icon {
  width: 44px; height: 44px;
  background: var(--accent-primary);
  border-radius: var(--radius-md);
  display: grid; place-items: center;
  font-size: 22px;
  box-shadow: 0 8px 20px rgba(37,99,235,.4);
}
.login-logo-text { font-size: 22px; font-weight: 700; letter-spacing: -.5px; color: var(--text-primary); }
.login-logo-sub { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; display: block; }
.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px 40px;
  box-shadow: var(--shadow-lg);
}
.login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -.3px; }
.login-card .sub { color: var(--text-secondary); font-size: 13.5px; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 12.5px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px;
}
.input-wrap { position: relative; }
.input-wrap .inp-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }
.inp {
  width: 100%; height: 44px;
  border: 1.5px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg-surface2); color: var(--text-primary);
  font-size: 14px; padding: 0 14px 0 40px; outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.inp:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
.inp.err { border-color: var(--danger); }
.login-error {
  background: var(--danger-bg); color: var(--danger);
  border: 1px solid currentColor; border-radius: var(--radius-sm);
  padding: 10px 14px; font-size: 13px; font-weight: 500;
  margin-bottom: 16px; display: none;
}
.login-error.show { display: block; animation: shake .35s ease; }
.toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; cursor: pointer; transition: color var(--transition); }
.toggle-pw:hover { color: var(--accent-primary); }

/* ══════════════════════════════════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; padding: 0 18px; height: 38px;
  border-radius: var(--radius-md); font-size: 13.5px; font-weight: 600;
  transition: all var(--transition); white-space: nowrap;
}
.btn-full { width: 100%; height: 46px; font-size: 15px; }
.btn-sm { height: 30px; padding: 0 12px; font-size: 12px; }
.btn-primary {
  background: var(--accent-primary); color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,.3);
}
.btn-primary:hover:not(:disabled) { background: #1d4ed8; box-shadow: 0 4px 14px rgba(37,99,235,.4); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--bg-surface2); color: var(--text-primary); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #b91c1c; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { background: #047857; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-webform {
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  color: #fff; border: none;
  box-shadow: 0 2px 10px rgba(124,58,237,.35);
}
.btn-webform:hover { box-shadow: 0 4px 18px rgba(124,58,237,.5); transform: translateY(-1px); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ══════════════════════════════════════════════════════════════════════════════
   APP SHELL LAYOUT
   ══════════════════════════════════════════════════════════════════════════════ */
.hidden { display: none !important; }

#app-shell { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  transition: width var(--transition), min-width var(--transition);
  z-index: 100;
  border-right: 1px solid rgba(255,255,255,.04);
}
#sidebar.collapsed { width: 64px; min-width: 64px; }
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
  overflow: hidden; cursor: pointer;
}
.sidebar-logo:hover { background: var(--bg-sidebar-h); }
.sidebar-logo-icon {
  width: 34px; height: 34px; min-width: 34px;
  background: var(--accent-primary); border-radius: 8px;
  display: grid; place-items: center; font-size: 16px; color: #fff;
  box-shadow: 0 4px 12px rgba(37,99,235,.4);
}
.sidebar-logo-text { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; line-height: 1.3; }
.sidebar-logo-sub  { font-size: 10px; color: var(--text-sidebar); white-space: nowrap; }
#sidebar.collapsed .sidebar-logo-text,
#sidebar.collapsed .sidebar-logo-sub { display: none; }
.sidebar-nav { flex: 1; padding: 10px 0; }
.nav-section-label {
  font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-muted); padding: 14px 18px 6px;
  opacity: .6; white-space: nowrap; overflow: hidden;
}
#sidebar.collapsed .nav-section-label { opacity: 0; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; color: var(--text-sidebar);
  font-size: 13.5px; font-weight: 500; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
  margin: 2px 8px; border-radius: var(--radius-sm);
  position: relative; overflow: visible;
}
.nav-item:hover { background: var(--bg-sidebar-h); color: #fff; }
.nav-item.active { background: var(--bg-sidebar-a); color: var(--text-sidebar-a); box-shadow: 0 2px 8px rgba(37,99,235,.35); }
.nav-item .nav-icon { font-size: 16px; min-width: 20px; text-align: center; }
.nav-item .nav-label { flex: 1; }
#sidebar.collapsed .nav-label { display: none; }
.nav-badge {
  background: var(--danger); color: #fff;
  font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
  padding: 0 5px; border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center;
}
#sidebar.collapsed .nav-badge { position: absolute; top: 4px; right: 6px; }
.sidebar-footer { padding: 12px 8px; border-top: 1px solid rgba(255,255,255,.06); }
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
}
.sidebar-user:hover { background: var(--bg-sidebar-h); }
.user-avatar {
  width: 34px; height: 34px; min-width: 34px;
  border-radius: 50%; background: var(--accent-primary);
  display: grid; place-items: center; font-size: 14px; font-weight: 700; color: #fff;
}
.user-info { overflow: hidden; }
.user-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 10.5px; color: var(--text-sidebar); text-transform: uppercase; letter-spacing: .5px; }
#sidebar.collapsed .user-info { display: none; }

/* ── Main Content ──────────────────────────────────────────────────────────── */
#main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); }

/* ── Top Bar ───────────────────────────────────────────────────────────────── */
#topbar {
  height: var(--topbar-h); min-height: var(--topbar-h);
  background: var(--bg-surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 22px; gap: 14px; z-index: 50;
}
.topbar-toggle {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  background: transparent; border: 1.5px solid var(--border);
  color: var(--text-secondary); display: grid; place-items: center;
  font-size: 14px; transition: all var(--transition);
}
.topbar-toggle:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.topbar-breadcrumb { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.topbar-spacer { flex: 1; }
.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 0 12px; width: 260px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-wrap:focus-within { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-wrap i { color: var(--text-muted); font-size: 13px; }
.search-input { flex: 1; height: 36px; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 13.5px; }
.search-input::placeholder { color: var(--text-muted); }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.notif-btn {
  position: relative; width: 36px; height: 36px;
  border-radius: var(--radius-md); background: var(--bg-surface2);
  border: 1.5px solid var(--border); color: var(--text-secondary);
  display: grid; place-items: center; font-size: 15px; transition: all var(--transition);
}
.notif-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 8px; height: 8px; background: var(--danger); border-radius: 50%;
  border: 2px solid var(--bg-surface); display: none;
}
.notif-dot.show { display: block; animation: pulse 2s infinite; }
.theme-btn {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  background: var(--bg-surface2); border: 1.5px solid var(--border);
  color: var(--text-secondary); display: grid; place-items: center;
  font-size: 15px; transition: all var(--transition);
}
.theme-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

/* ── View Container ────────────────────────────────────────────────────────── */
#view-container { flex: 1; overflow-y: auto; padding: 24px; }
.view { display: none; }
.view.active { display: block; animation: fadeIn .2s ease; }
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}
.page-title { font-size: 20px; font-weight: 700; letter-spacing: -.4px; }
.page-title span { color: var(--accent-primary); }

/* ── Stats Row ─────────────────────────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-sm); transition: box-shadow var(--transition), transform var(--transition);
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.stat-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: grid; place-items: center; font-size: 18px; }
.stat-icon.blue   { background: var(--accent-lighter); color: var(--accent-primary); }
.stat-icon.green  { background: var(--success-bg);     color: var(--success); }
.stat-icon.yellow { background: var(--warning-bg);     color: var(--warning); }
.stat-icon.red    { background: var(--danger-bg);      color: var(--danger); }
.stat-icon.purple { background: var(--purple-bg);      color: var(--purple); }
.stat-info { flex: 1; }
.stat-value { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -1px; line-height: 1; }
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
.stat-sub   { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }

/* ══════════════════════════════════════════════════════════════════════════════
   INCENTIVE BANNER
   ══════════════════════════════════════════════════════════════════════════════ */
.incentive-banner {
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4338ca 60%, #1d4ed8 100%);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 20px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(67,56,202,.35);
  animation: fadeIn .4s ease;
}
.incentive-banner::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.incentive-trophy {
  font-size: 44px;
  line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.3));
  animation: bounce-subtle 2s ease-in-out infinite;
  flex-shrink: 0;
}
.incentive-content { flex: 1; }
.incentive-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; opacity: .7; margin-bottom: 4px;
}
.incentive-prize {
  font-size: 22px; font-weight: 800; letter-spacing: -.5px;
  line-height: 1.2; margin-bottom: 8px;
  text-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.incentive-target {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  border-radius: 999px; padding: 4px 12px;
  font-size: 12px; font-weight: 600; margin-bottom: 10px;
}
.incentive-rules {
  font-size: 12.5px; opacity: .85; line-height: 1.5;
}
.incentive-who {
  margin-top: 8px;
  font-size: 11px; opacity: .6;
  display: flex; align-items: center; gap: 5px;
}
.incentive-close {
  position: absolute; top: 12px; right: 14px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none; color: #fff;
  display: grid; place-items: center; font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.incentive-close:hover { background: rgba(255,255,255,.3); }

/* ── Card ──────────────────────────────────────────────────────────────────── */
.card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.card-title { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }
.card-body { padding: 20px; }

/* ── Filters Bar ───────────────────────────────────────────────────────────── */
.filters-bar {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px;
  margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.filter-select {
  height: 34px; padding: 0 10px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); background: var(--bg-surface2);
  color: var(--text-primary); font-size: 12.5px; outline: none; cursor: pointer;
  transition: border-color var(--transition); min-width: 140px;
}
.filter-select:focus { border-color: var(--accent-primary); }
.filter-date {
  height: 34px; padding: 0 10px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); background: var(--bg-surface2);
  color: var(--text-primary); font-size: 12.5px; outline: none;
  transition: border-color var(--transition);
}
.filter-date:focus { border-color: var(--accent-primary); }

/* ── Data Table ────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted);
  background: var(--bg-surface2); border-bottom: 1px solid var(--border); white-space: nowrap;
}
.data-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
.data-table tbody tr { cursor: pointer; transition: background var(--transition); }
.data-table tbody tr:hover { background: var(--accent-lighter); }
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.data-table .name-cell { font-weight: 600; }
.data-table .phone-cell { color: var(--text-secondary); font-family: 'DM Mono', monospace; font-size: 12px; }

/* ══════════════════════════════════════════════════════════════════════════════
   STATUS BADGES — Production-aware color system
   ══════════════════════════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}

/* Production = real value */
.badge-production {
  background: #dcfce7; color: #15803d;
  border: 1px solid rgba(21,128,61,.25);
  font-weight: 700;
}
[data-theme="dark"] .badge-production { background: rgba(16,185,129,.2); color: #34d399; border-color: rgba(52,211,153,.3); }

/* Potential = ICO team working */
.badge-potential {
  background: #fef9c3; color: #a16207;
  border: 1px solid rgba(161,98,7,.2);
}
[data-theme="dark"] .badge-potential { background: rgba(245,158,11,.15); color: #fcd34d; }

/* In-process = pipeline */
.badge-inprocess {
  background: var(--info-bg); color: var(--info);
  border: 1px solid rgba(8,145,178,.2);
}

/* Approved = payable */
.badge-approved {
  background: #dcfce7; color: #15803d; border: 1px solid rgba(21,128,61,.25); font-weight: 700;
}
[data-theme="dark"] .badge-approved { background: rgba(16,185,129,.2); color: #34d399; }

/* RTS = red flag */
.badge-rts {
  background: #fff7ed; color: #c2410c; border: 1px solid rgba(194,65,12,.3);
  animation: pulse-subtle 3s ease-in-out infinite;
}
[data-theme="dark"] .badge-rts { background: rgba(251,146,60,.15); color: #fb923c; }

/* Denied */
.badge-denied { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }

/* Trash / irrelevant */
.badge-trash { background: var(--bg-surface2); color: var(--text-muted); border: 1px solid var(--border); }

/* Standard badges kept */
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
.badge-danger  { background: var(--danger-bg);  color: var(--danger);  }
.badge-info    { background: var(--info-bg);     color: var(--info);    }
.badge-neutral { background: var(--bg-surface2); color: var(--text-muted); border: 1px solid var(--border); }
.badge-primary { background: var(--accent-lighter); color: var(--accent-primary); }

/* ── Pagination ────────────────────────────────────────────────────────────── */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); background: var(--bg-surface2); }
.pagination-info { font-size: 12.5px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }
.pagination-btns { display: flex; gap: 6px; }
.page-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--bg-surface);
  color: var(--text-secondary); font-size: 12px; display: grid; place-items: center;
  transition: all var(--transition);
}
.page-btn:hover:not(:disabled) { border-color: var(--accent-primary); color: var(--accent-primary); }
.page-btn.active { background: var(--accent-primary); border-color: var(--accent-primary); color: #fff; }
.page-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ══════════════════════════════════════════════════════════════════════════════
   LEAD DETAIL MODAL
   ══════════════════════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 16px; animation: fadeIn .2s ease;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); width: 860px; max-width: 100%; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); animation: slideUp .28s ease both;
}
.modal-head {
  display: flex; align-items: flex-start;
  padding: 22px 24px 18px; border-bottom: 1px solid var(--border); gap: 12px;
}
.modal-lead-id {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent-primary);
  background: var(--accent-lighter); padding: 2px 8px; border-radius: 4px;
  margin-bottom: 4px; display: inline-block;
}
.modal-name { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
.modal-close {
  margin-left: auto; width: 32px; height: 32px;
  border-radius: var(--radius-sm); color: var(--text-muted);
  display: grid; place-items: center; font-size: 16px; transition: all var(--transition);
}
.modal-close:hover { background: var(--danger-bg); color: var(--danger); }
.modal-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.modal-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; overflow-x: auto; }
.modal-tab {
  padding: 8px 14px; font-size: 13px; font-weight: 600;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  cursor: pointer; transition: all var(--transition); margin-bottom: -1px; white-space: nowrap;
}
.modal-tab.active { color: var(--accent-primary); border-color: var(--accent-primary); }
.modal-tab:hover:not(.active) { color: var(--text-primary); }
.modal-tab-pane { display: none; }
.modal-tab-pane.active { display: block; animation: fadeIn .15s ease; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.detail-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); margin-bottom: 4px; }
.detail-value { font-size: 13.5px; color: var(--text-primary); font-weight: 500; word-break: break-word; }
.detail-value.mono { font-family: 'DM Mono', monospace; font-size: 12.5px; }
.detail-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent-primary);
  padding: 12px 0 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 14px; grid-column: 1 / -1;
}

/* ── Notes ─────────────────────────────────────────────────────────────────── */
.notes-compose {
  background: var(--bg-surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 14px; margin-bottom: 18px;
  transition: border-color var(--transition);
}
.notes-compose:focus-within { border-color: var(--accent-primary); }
.notes-textarea {
  width: 100%; min-height: 80px; background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 13.5px; resize: vertical;
  font-family: 'DM Sans', sans-serif; line-height: 1.5;
}
.notes-textarea::placeholder { color: var(--text-muted); }
.notes-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
.note-item {
  padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-md);
  margin-bottom: 10px; background: var(--bg-surface2); transition: border-color var(--transition);
}
.note-item:hover { border-color: var(--border-strong); }
.note-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.note-author { font-size: 12px; font-weight: 700; color: var(--accent-primary); }
.note-date { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.note-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* ══════════════════════════════════════════════════════════════════════════════
   NOTIFICATIONS PANEL
   ══════════════════════════════════════════════════════════════════════════════ */
#notif-panel {
  position: fixed; top: var(--topbar-h); right: 0;
  width: 380px; height: calc(100vh - var(--topbar-h));
  background: var(--bg-surface); border-left: 1px solid var(--border);
  z-index: 150; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow: -8px 0 30px rgba(0,0,0,.12);
}
#notif-panel.open { transform: translateX(0); }
.notif-panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
.notif-panel-title { font-size: 14px; font-weight: 700; }
.notif-panel-actions { display: flex; gap: 6px; }
.notif-list { flex: 1; overflow-y: auto; padding: 10px; }
.notif-item {
  padding: 12px 14px; border: 1px solid var(--border);
  border-radius: var(--radius-md); margin-bottom: 8px;
  cursor: pointer; transition: all var(--transition);
}
.notif-item:hover { border-color: var(--accent-primary); background: var(--accent-lighter); }
.notif-item.unread { border-left: 3px solid var(--accent-primary); background: var(--accent-lighter); }
.notif-lead-id { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--accent-primary); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.notif-changes { margin-bottom: 6px; }
.notif-change-row {
  display: flex; align-items: baseline; gap: 6px;
  font-size: 12.5px; padding: 2px 0;
}
.notif-change-field { font-weight: 700; color: var(--text-primary); font-size: 12px; min-width: 110px; }
.notif-change-arrow { color: var(--text-muted); font-size: 11px; }
.notif-change-to   { color: var(--success); font-weight: 600; font-size: 12.5px; }
.notif-time { font-size: 10.5px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 4px; }

/* ══════════════════════════════════════════════════════════════════════════════
   INSIGHTS / CHARTS
   ══════════════════════════════════════════════════════════════════════════════ */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.chart-card.wide { grid-column: 1 / -1; }
.chart-card.third { grid-column: span 1; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.chart-subtitle { font-size: 11.5px; color: var(--text-muted); margin-bottom: 16px; }
.chart-wrap { position: relative; height: 200px; }
.chart-wrap.tall { height: 260px; }
.chart-wrap.short { height: 160px; }

/* Production Funnel */
.funnel-container { padding: 10px 0; }
.funnel-stage {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 10px;
}
.funnel-label { width: 130px; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-align: right; flex-shrink: 0; }
.funnel-bar-wrap { flex: 1; background: var(--bg-surface2); border-radius: 999px; height: 28px; overflow: hidden; position: relative; }
.funnel-bar { height: 100%; border-radius: 999px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; font-weight: 700; color: #fff; transition: width .8s cubic-bezier(.4,0,.2,1); white-space: nowrap; }
.funnel-bar.production { background: linear-gradient(90deg, #059669, #10b981); }
.funnel-bar.potential  { background: linear-gradient(90deg, #d97706, #f59e0b); }
.funnel-bar.signed     { background: linear-gradient(90deg, #2563eb, #3b82f6); }
.funnel-bar.approved   { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
.funnel-pct { width: 50px; font-size: 12px; font-weight: 700; font-family: 'DM Mono', monospace; text-align: right; flex-shrink: 0; }
.funnel-pct.good  { color: var(--success); }
.funnel-pct.warn  { color: var(--warning); }
.funnel-pct.bad   { color: var(--danger); }

/* Quality Metrics Row */
.quality-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.quality-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 16px;
  text-align: center; position: relative; overflow: hidden;
}
.quality-card::before { content: ''; position: absolute; inset: 0; opacity: .04; }
.quality-card.great::before { background: var(--success); }
.quality-card.ok::before    { background: var(--warning); }
.quality-card.poor::before  { background: var(--danger); }
.quality-score { font-size: 32px; font-weight: 800; font-family: 'DM Mono', monospace; letter-spacing: -2px; line-height: 1; }
.quality-score.great { color: var(--success); }
.quality-score.ok    { color: var(--warning); }
.quality-score.poor  { color: var(--danger); }
.quality-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
.quality-desc  { font-size: 11px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; }

/* RTS Gauge */
.rts-gauge-wrap { display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
.rts-gauge-label { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-align: center; }
.rts-gauge-value { font-size: 28px; font-weight: 800; font-family: 'DM Mono', monospace; }
.rts-gauge-zone { display: flex; gap: 6px; margin-top: 10px; font-size: 11px; }
.zone-item { display: flex; align-items: center; gap: 4px; color: var(--text-muted); }
.zone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Insight Alert */
.insight-alert {
  border-radius: var(--radius-md); padding: 14px 16px;
  margin-bottom: 16px; display: flex; gap: 12px; align-items: flex-start;
  font-size: 13px; line-height: 1.5;
}
.insight-alert.warning { background: var(--warning-bg); border: 1px solid rgba(217,119,6,.25); color: var(--warning); }
.insight-alert.danger  { background: var(--danger-bg);  border: 1px solid rgba(220,38,38,.25);  color: var(--danger); }
.insight-alert.success { background: var(--success-bg); border: 1px solid rgba(5,150,105,.25);  color: var(--success); }
.insight-alert.info    { background: var(--info-bg);    border: 1px solid rgba(8,145,178,.25);   color: var(--info); }
.insight-alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.insight-alert-text { color: var(--text-primary); }
.insight-alert-text strong { color: inherit; }

/* Section header for insights */
.section-header { display: flex; align-items: baseline; gap: 10px; margin: 24px 0 14px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.section-subtitle { font-size: 12px; color: var(--text-muted); }

/* ══════════════════════════════════════════════════════════════════════════════
   CHAT
   ══════════════════════════════════════════════════════════════════════════════ */
.chat-layout { display: flex; gap: 0; height: calc(100vh - 160px); min-height: 400px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
.chat-sidebar { width: 220px; min-width: 220px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-surface2); overflow: hidden; }
.chat-sidebar-head { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-muted); }
.chat-center-list { flex: 1; overflow-y: auto; padding: 8px; }
.chat-center-item {
  padding: 10px 12px; border-radius: var(--radius-md); cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: background var(--transition); margin-bottom: 4px;
}
.chat-center-item:hover   { background: var(--border); }
.chat-center-item.active  { background: var(--accent-lighter); color: var(--accent-primary); }
.chat-center-item.unread  { font-weight: 700; }
.chat-center-code { font-size: 12.5px; font-weight: 600; font-family: 'DM Mono', monospace; flex: 1; }
.chat-center-badge { background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: grid; place-items: center; padding: 0 4px; }
.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-main-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg-surface); }
.chat-main-title { font-size: 14px; font-weight: 700; flex: 1; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg-wrap { display: flex; flex-direction: column; max-width: 70%; }
.chat-msg-wrap.mine  { align-self: flex-end; align-items: flex-end; }
.chat-msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }
.chat-bubble {
  padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5;
  word-break: break-word;
}
.chat-msg-wrap.mine   .chat-bubble { background: var(--accent-primary); color: #fff; border-bottom-right-radius: 4px; }
.chat-msg-wrap.theirs .chat-bubble { background: var(--bg-surface2); border: 1px solid var(--border); color: var(--text-primary); border-bottom-left-radius: 4px; }
.chat-meta { font-size: 10.5px; color: var(--text-muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
.chat-sender { font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 3px; }
.chat-input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg-surface); }
.chat-textarea {
  flex: 1; background: var(--bg-surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 10px 14px;
  font-size: 13.5px; color: var(--text-primary); outline: none; resize: none;
  height: 46px; max-height: 120px; overflow-y: auto;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-family: 'DM Sans', sans-serif;
}
.chat-textarea:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
.chat-textarea::placeholder { color: var(--text-muted); }
.chat-send-btn { width: 46px; height: 46px; border-radius: var(--radius-md); background: var(--accent-primary); color: #fff; display: grid; place-items: center; font-size: 16px; transition: all var(--transition); flex-shrink: 0; }
.chat-send-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
.chat-send-btn:disabled { opacity: .5; transform: none; }
.chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); gap: 12px; padding: 40px; }
.chat-empty i { font-size: 48px; opacity: .2; }
.chat-empty p { font-size: 14px; text-align: center; }

/* ══════════════════════════════════════════════════════════════════════════════
   USER MANAGEMENT & FORMS
   ══════════════════════════════════════════════════════════════════════════════ */
.users-table .action-btns { display: flex; gap: 6px; }
.role-badge { padding: 2px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.role-badge.admin  { background: var(--accent-lighter); color: var(--accent-primary); }
.role-badge.center { background: var(--info-bg); color: var(--info); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-label { display: block; font-size: 11.5px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.form-input {
  width: 100%; height: 38px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-surface2); color: var(--text-primary); font-size: 13.5px; padding: 0 12px; outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-select {
  width: 100%; height: 38px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-surface2); color: var(--text-primary); font-size: 13.5px; padding: 0 12px; outline: none; cursor: pointer;
  transition: border-color var(--transition);
}
.form-select:focus { border-color: var(--accent-primary); }
.form-textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-surface2); color: var(--text-primary); font-size: 13.5px; padding: 10px 12px;
  outline: none; resize: vertical; font-family: 'DM Sans', sans-serif; min-height: 80px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-textarea:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }

/* ── Incentives Table ──────────────────────────────────────────────────────── */
.incentive-active-row { background: rgba(5,150,105,.06) !important; }
.active-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; background: var(--success-bg); color: var(--success); padding: 2px 8px; border-radius: 999px; }
.active-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }

/* ══════════════════════════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ══════════════════════════════════════════════════════════════════════════════ */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border-radius: var(--radius-md); background: var(--bg-surface); border: 1px solid var(--border);
  box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 500;
